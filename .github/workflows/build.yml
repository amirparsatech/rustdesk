name: Build RustDesk Windows (نهایی)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          cd vcpkg
          .\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install libraries (بدون aom)
        run: |
          cd vcpkg
          .\vcpkg.exe install opus:x64-windows-static --classic
          .\vcpkg.exe install libvpx:x64-windows-static libyuv:x64-windows-static --classic

      - name: Disable aom completely in scrap
        run: |
          # خالی کردن فایل هدر aom_ffi.h
          echo "// aom disabled" > libs/scrap/src/bindings/aom_ffi.h
          # خالی کردن فایل aom.rs تا import ها ناپدید شوند
          echo "// aom disabled" > libs/scrap/src/common/aom.rs
          # غیرفعال کردن شرط aom در build.rs
          (Get-Content libs/scrap/build.rs) -replace 'if let Some\(lib\) = find_vcpkg\("aom", "include/aom/aom.h"\) {', 'if false { // aom disabled' | Set-Content libs/scrap/build.rs
          (Get-Content libs/scrap/build.rs) -replace '} else \{\s*let dst = vcpkg::Config::new\(\)\.find_package\("aom"\)\.unwrap\(\);', '} else { /* aom disabled' | Set-Content libs/scrap/build.rs
          (Get-Content libs/scrap/build.rs) -replace 'println!\("cargo:rustc-link-lib=static=aom"\);', '// println!("cargo:rustc-link-lib=static=aom");' | Set-Content libs/scrap/build.rs
          (Get-Content libs/scrap/build.rs) -replace 'println!\("cargo:rustc-link-search=\{\}/lib", dst\);', '// println!("cargo:rustc-link-search={}/lib", dst);' | Set-Content libs/scrap/build.rs
          (Get-Content libs/scrap/build.rs) -replace 'println!\("cargo:include=\{\}/include", dst\);', '// println!("cargo:include={}/include", dst);' | Set-Content libs/scrap/build.rs

      - name: Build RustDesk
        run: |
          cd flutter
          flutter pub get
          cd ..
          cargo build --release --features "inline"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: target\release\rustdesk.exe
