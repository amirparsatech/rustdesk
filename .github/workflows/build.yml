name: Build RustDesk Windows (نهایی)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          cd vcpkg
          .\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install libraries (با حالت کلاسیک)
        run: |
          cd vcpkg
          .\vcpkg.exe install opus:x64-windows-static --classic
          .\vcpkg.exe install libvpx:x64-windows-static libyuv:x64-windows-static --classic

      - name: Set environment variables for opus
        run: |
          echo "OPUS_STATIC=1" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "OPUS_LIB_DIR=$env:GITHUB_WORKSPACE\vcpkg\installed\x64-windows-static\lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "OPUS_INCLUDE_DIR=$env:GITHUB_WORKSPACE\vcpkg\installed\x64-windows-static\include" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "DEP_OPUS_INCLUDE=$env:GITHUB_WORKSPACE\vcpkg\installed\x64-windows-static\include" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build RustDesk
        run: |
          cd flutter
          flutter pub get
          cd ..
          cargo build --release --features "inline"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows
          path: target\release\rustdesk.exe
